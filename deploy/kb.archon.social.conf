# kb.archon.social — Hearthold Knowledge Portal (public Mage)
#
# Serves the static portal build and reverse-proxies the KB API to the loopback-bound
# Mage bridge (witness kb-web) on 127.0.0.1:4313. The Mage never binds a public interface;
# only nginx (TLS) faces the world. Modeled on archon-social.conf.
#
# Install: copy to /etc/nginx/sites-available/, symlink into sites-enabled/, `nginx -t`, reload,
# then `certbot --nginx -d kb.archon.social` (which upgrades this to :443 + adds the 80→443 redirect).

server {
    listen 80;
    listen [::]:80;
    server_name kb.archon.social;

    # Let certbot answer the ACME http-01 challenge (webroot fallback; --nginx mode also works).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Static portal SPA (Vite build output).
    root /opt/hearthold/apps/kb-portal/dist;
    index index.html;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    client_max_body_size 4m;

    # KB API → the loopback Mage bridge (HTTP → DIDComm).
    # session-request can wait out a factor-2 Signet step-up (Mage timeout 200s), so allow >200s.
    location /api/ {
        proxy_pass http://127.0.0.1:4313;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    210s;
        proxy_read_timeout    210s;
    }

    # SPA routing: everything else serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
